version: 2
updates:
  # Python deps resolve through uv.lock (dependency-groups only; the
  # published package has zero runtime dependencies).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-and-docs:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
